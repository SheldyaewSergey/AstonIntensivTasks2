<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Service</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>Управление пользователями</h1>

    <div class="form-card">
        <h2 id="formTitle">+ Создать пользователя</h2>
        <form id="userForm">
            <input type="hidden" id="userId">

            <div class="form-group">
                <label for="name">Имя *</label>
                <input type="text" id="name" name="name" required minlength="2" maxlength="100" placeholder="Введите имя">
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required placeholder="user@example.com">
            </div>

            <div class="form-group">
                <label for="age">Возраст *</label>
                <input type="number" id="age" name="age" required min="0" max="150" placeholder="25">
            </div>

            <div class="form-actions">
                <button type="submit" id="submitBtn" class="btn btn-primary">Создать</button>
                <button type="button" id="cancelBtn" class="btn btn-secondary" style="display: none;">Отмена</button>
            </div>
        </form>
        <div id="formError" class="error-message"></div>
    </div>

    <div class="table-card">
        <h2>Список пользователей</h2>
        <button id="refreshBtn" class="btn btn-small">Обновить</button>

        <table id="usersTable">
            <thead>
            <tr>
                <th>ID</th>
                <th>Имя</th>
                <th>Email</th>
                <th>Возраст</th>
                <th>Создан</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody id="usersBody">

            </tbody>
        </table>
        <div id="tableMessage" class="empty-message">Загрузка...</div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
